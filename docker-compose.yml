x-worker-base: &worker-base
  build: .
  networks:
    - internal
  read_only: true
  tmpfs:
    - /tmp:size=512M
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  stop_grace_period: 60s
  restart: unless-stopped

services:
  redis:
    image: redis:7-alpine
    command: >
      redis-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save ""
    networks:
      - internal
      - control
    ports:
      - "127.0.0.1:6399:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  worker-python:
    <<: *worker-base
    deploy:
      replicas: 2
    environment:
      REDIS_URL: redis://redis:6379/0
      WORKER_DIR: /app/workers/python
      MAX_CONCURRENT: "4"
      OPENBLAS_NUM_THREADS: "2"
    pids_limit: 256
    mem_limit: 1g
    memswap_limit: 1g
    cpus: 2.0

  worker-image-processor:
    <<: *worker-base
    environment:
      REDIS_URL: redis://redis:6379/0
      WORKER_DIR: /app/workers/image-processor
      MAX_CONCURRENT: "4"
    pids_limit: 64
    mem_limit: 512m
    memswap_limit: 512m
    cpus: 1.0
    stop_grace_period: 30s

networks:
  internal:
    driver: bridge
    internal: true       # workers: no internet, no LAN — only redis
  control:
    driver: bridge       # redis host access for the client

volumes:
  redis-data:
