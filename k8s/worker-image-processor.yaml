apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-image-processor
  namespace: flute
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-image-processor
  template:
    metadata:
      labels:
        app: worker-image-processor
    spec:
      containers:
        - name: worker
          image: YOUR_REGISTRY.azurecr.io/flute-worker:latest
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: flute-redis
                  key: REDIS_URL
            - name: WORKER_DIR
              value: /app/workers/image-processor
            - name: MAX_CONCURRENT
              value: "4"
          resources:
            requests:
              cpu: "500m"
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 512Mi
