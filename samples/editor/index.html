<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">

<style>
:root {
  --bg: #1e1e2e; --bg2: #262637; --bg3: #313244; --border: #45475a;
  --text: #cdd6f4; --muted: #6c7086; --blue: #89b4fa; --green: #a6e3a1;
  --red: #f38ba8; --yellow: #f9e2af; --surface: #2a2b3d;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
header { display: flex; align-items: center; gap: 16px; padding: 8px 16px;
  background: var(--bg2); border-bottom: 1px solid var(--border); flex-shrink: 0;
  position: relative; z-index: 100; }
header h1 { font-size: 16px; font-weight: 600; color: var(--blue); white-space: nowrap; }
.controls { display: flex; align-items: center; gap: 12px; margin-left: auto; }
.controls label { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
.controls select { background: var(--bg3); color: var(--text); border: 1px solid var(--border);
  border-radius: 4px; padding: 3px 6px; font-size: 12px; }
#run-btn { background: var(--green); color: #1e1e2e; border: none; border-radius: 6px;
  padding: 6px 18px; font-weight: 600; font-size: 13px; cursor: pointer; transition: all .15s; }
#run-btn:hover { filter: brightness(1.1); }
#run-btn:disabled { background: var(--muted); cursor: wait; }
#run-btn.running { background: var(--red); cursor: pointer; }
main { display: grid; grid-template-columns: 1fr 380px; flex: 1; min-height: 0; }
#editor-panel { display: flex; flex-direction: column; min-height: 0; border-right: 1px solid var(--border); }
#editor-panel .CodeMirror { flex: 1; font-size: 13px; line-height: 1.5; }
#side-panel { display: flex; flex-direction: column; overflow-y: auto; }
.section { padding: 10px 14px; border-bottom: 1px solid var(--border); }
.section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
  color: var(--muted); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.section h3 small { text-transform: none; letter-spacing: normal; font-weight: 400; }
.params-editor .CodeMirror { height: 120px; font-size: 12px; border: 1px solid var(--border); border-radius: 4px; }
#drop-zone { border: 2px dashed var(--border); border-radius: 6px; padding: 14px;
  text-align: center; color: var(--muted); font-size: 12px; cursor: pointer; transition: all .15s; }
#drop-zone:hover, #drop-zone.dragover { border-color: var(--blue); color: var(--blue); }
.file-chip { display: inline-flex; align-items: center; gap: 4px; background: var(--bg3);
  border-radius: 4px; padding: 3px 8px; margin: 4px 4px 0 0; font-size: 12px; }
.file-chip button { background: none; border: none; color: var(--red); cursor: pointer;
  font-size: 14px; line-height: 1; padding: 0 2px; }
#status-bar { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 8px; }
.dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.dot.running { background: var(--yellow); animation: pulse 1s infinite; }
.dot.completed { background: var(--green); }
.dot.error, .dot.killed, .dot.cancelled { background: var(--red); }
.dot.idle { background: var(--muted); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
#logs-box { background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
  padding: 8px; font-family: 'SF Mono', Consolas, monospace; font-size: 12px;
  white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; min-height: 40px; color: var(--text); }
.result-json { background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
  padding: 8px; font-family: 'SF Mono', Consolas, monospace; font-size: 12px;
  white-space: pre-wrap; max-height: 200px; overflow-y: auto; margin-bottom: 8px; color: var(--green); }
.error-text { color: var(--red); }
.output-file { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; }
.output-file .fname { color: var(--blue); flex: 1; }
.output-file button { background: var(--bg3); color: var(--text); border: 1px solid var(--border);
  border-radius: 4px; padding: 2px 10px; font-size: 11px; cursor: pointer; }
.output-file button:hover { border-color: var(--blue); }
.output-img { max-width: 100%; border-radius: 4px; margin: 6px 0; border: 1px solid var(--border); }
.output-text { background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
  padding: 6px; font-size: 11px; max-height: 150px; overflow-y: auto;
  font-family: monospace; white-space: pre-wrap; margin: 4px 0; }
.hidden { display: none; }
.CodeMirror-hints { z-index: 100; }

/* --- Tabs --- */
#tab-bar { display: flex; align-items: center; background: var(--bg2); border-bottom: 1px solid var(--border);
  flex-shrink: 0; overflow-x: auto; padding: 0 4px; gap: 2px; min-height: 32px; }
#tab-bar::-webkit-scrollbar { height: 3px; }
#tab-bar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.tab { display: flex; align-items: center; gap: 4px; padding: 4px 10px; font-size: 12px;
  color: var(--muted); cursor: pointer; border-radius: 4px 4px 0 0; white-space: nowrap;
  border: 1px solid transparent; border-bottom: none; user-select: none; flex-shrink: 0; }
.tab:hover { color: var(--text); background: var(--bg3); }
.tab.active { color: var(--text); background: var(--bg); border-color: var(--border); }
.tab .close-tab { background: none; border: none; color: var(--muted); cursor: pointer;
  font-size: 14px; line-height: 1; padding: 0 2px; margin-left: 2px; }
.tab .close-tab:hover { color: var(--red); }
.tab-name { max-width: 140px; overflow: hidden; text-overflow: ellipsis; }
.tab-name-input { background: var(--bg); color: var(--text); border: 1px solid var(--blue);
  border-radius: 2px; font-size: 12px; padding: 0 4px; width: 120px; outline: none; }
#add-tab { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px;
  padding: 4px 8px; line-height: 1; flex-shrink: 0; }
#add-tab:hover { color: var(--green); }
#status-footer { display: flex; align-items: center; gap: 12px; padding: 3px 14px;
  background: var(--bg2); border-top: 1px solid var(--border); flex-shrink: 0;
  font-size: 11px; color: var(--muted); font-family: 'SF Mono', Consolas, monospace; }

/* --- Service mode & progress --- */
#service-selector { margin-right: 4px; }
#steps-section { padding: 10px 14px; border-bottom: 1px solid var(--border); }
.step-check { display: flex; align-items: center; gap: 6px; font-size: 12px; margin-bottom: 4px; }
.step-check input { accent-color: var(--blue); }
#progress-bar-wrap { display: none; margin-bottom: 8px; }
#progress-bar-wrap.active { display: block; }
#progress-bar { width: 100%; height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
#progress-bar-fill { height: 100%; background: var(--blue); border-radius: 3px; transition: width .3s; width: 0%; }
#progress-label { font-size: 11px; color: var(--muted); margin-top: 3px; display: flex;
  justify-content: space-between; }
#service-drop-hint { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 13px;
  flex-direction: column; align-items: center; justify-content: center; flex: 1;
  cursor: pointer; border: 2px dashed transparent; transition: border-color .15s; margin: 12px; border-radius: 8px;
  display: none; }
#service-drop-hint:hover { border-color: var(--border); }
#service-drop-hint .big { font-size: 32px; margin-bottom: 8px; opacity: .5; }

/* --- UI Renderer --- */
#ui-panel { display: none; flex-direction: column; overflow: hidden; flex: 1; min-height: 0; }
#ui-panel.active { display: flex; }
.ui-dismiss-bar { display: flex; align-items: center; padding: 4px 8px; background: var(--bg2);
  border-bottom: 1px solid var(--border); flex-shrink: 0; }
.ui-dismiss-bar button { background: none; border: 1px solid var(--border); color: var(--muted);
  border-radius: 4px; padding: 2px 10px; font-size: 11px; cursor: pointer; }
.ui-dismiss-bar button:hover { color: var(--text); border-color: var(--text); }
/* Document flow: vertical scroll by default (chat-friendly) */
.ui-container { flex: 1; display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden; padding: 8px; gap: 12px; }
.ui-container.ui-layout-mode { overflow: hidden; padding: 0; gap: 0; }
.ui-cell { position: relative; }
/* Document-mode cells get natural sizing with margins */
.ui-container > .ui-cell { min-height: 0; }
/* Explicit layout modes */
.ui-split-h { display: flex; flex-direction: row; flex: 1; overflow: hidden; }
.ui-split-v { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
.ui-split-h > .ui-cell, .ui-split-v > .ui-cell { overflow: auto; min-width: 0; min-height: 0; }
.ui-grid { display: grid; gap: 8px; flex: 1; overflow: auto; padding: 8px; }
.ui-tabs-bar { display: flex; gap: 2px; background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 0 4px; overflow-x: auto; flex-shrink: 0; }
.ui-tab-btn { padding: 6px 14px; font-size: 12px; background: none; border: none; color: var(--muted);
  cursor: pointer; border-bottom: 2px solid transparent; }
.ui-tab-btn.active { color: var(--text); border-bottom-color: var(--blue); }
.ui-tab-content { display: none; flex: 1; overflow: auto; }
.ui-tab-content.active { display: flex; flex-direction: column; }
.ui-three-canvas { width: 100%; height: 100%; display: block; }
/* Plotly/Three wrappers */
.ui-plotly-wrap { width: 100%; height: 100%; }
.ui-three-wrap { width: 100%; height: 100%; overflow: hidden; }
/* Document mode: intrinsic heights so content flows like a chat message */
.ui-container:not(.ui-layout-mode) > .ui-cell > .ui-plotly-wrap { height: 400px; }
.ui-container:not(.ui-layout-mode) > .ui-cell > .ui-three-wrap { height: 400px; border-radius: 6px; }
.ui-table-wrap { padding: 8px; overflow: auto; }
.ui-table-wrap table { width: 100%; border-collapse: collapse; font-size: 12px; }
.ui-table-wrap th { text-align: left; padding: 6px 10px; background: var(--bg3); color: var(--muted);
  font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: .05em;
  border-bottom: 1px solid var(--border); position: sticky; top: 0; }
.ui-table-wrap td { padding: 5px 10px; border-bottom: 1px solid var(--border); }
.ui-text-block { padding: 12px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; }
.ui-image-wrap { padding: 8px; text-align: center; }
.ui-image-wrap img { max-width: 100%; border-radius: 4px; }
.ui-controls-bar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; padding: 8px 12px;
  background: var(--bg2); border-top: 1px solid var(--border); flex-shrink: 0; }
.ui-control { display: flex; align-items: center; gap: 6px; font-size: 12px; }
.ui-control label { color: var(--muted); white-space: nowrap; }
.ui-control input[type="range"] { width: 120px; accent-color: var(--blue); }
.ui-control input[type="number"], .ui-control input[type="text"] {
  background: var(--bg3); color: var(--text); border: 1px solid var(--border);
  border-radius: 4px; padding: 3px 6px; font-size: 12px; width: 100px; }
.ui-control select { background: var(--bg3); color: var(--text); border: 1px solid var(--border);
  border-radius: 4px; padding: 3px 6px; font-size: 12px; }
.ui-submit-btn { background: var(--blue); color: #1e1e2e; border: none; border-radius: 4px;
  padding: 5px 16px; font-size: 12px; font-weight: 600; cursor: pointer; margin-left: auto; }
.ui-submit-btn:hover { filter: brightness(1.1); }
.ui-file-drop-zone { border: 2px dashed var(--border); border-radius: 6px; padding: 12px;
  text-align: center; color: var(--muted); font-size: 12px; cursor: pointer; min-width: 120px; }
.ui-file-drop-zone:hover, .ui-file-drop-zone.dragover { border-color: var(--blue); color: var(--blue); }

/* --- Samples menu --- */
#samples-btn { background: none; color: var(--muted); border: 1px solid var(--border);
  border-radius: 4px; padding: 2px 8px; font-size: 11px; cursor: pointer; line-height: 1.4; }
#samples-btn:hover { color: var(--text); border-color: var(--blue); }
#samples-menu { display: none; position: fixed;
  background: var(--bg2); border: 1px solid var(--border); border-radius: 6px;
  min-width: 240px; max-height: 380px; overflow-y: auto; z-index: 10000;
  box-shadow: 0 8px 24px rgba(0,0,0,.5); }
#samples-menu.open { display: block; }
.samples-cat { padding: 5px 10px; font-size: 10px; text-transform: uppercase; letter-spacing: .06em;
  color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--bg2); }
.samples-cat:first-child { border-radius: 6px 6px 0 0; }
.sample-item { display: block; padding: 5px 10px; font-size: 12px; cursor: pointer;
  border-bottom: 1px solid var(--border); transition: background .1s; }
.sample-item:hover { background: var(--bg3); }
.sample-item:last-child { border-bottom: none; }
.sample-item .title { color: var(--text); font-weight: 500; }
.sample-item .desc { color: var(--muted); font-size: 11px; margin-top: 1px; }
</style>

<script>
// --- State ---
const attachedFiles = {};
let currentSid = null;
let polling = false;
let serviceMode = false;       // true when a service endpoint is selected
let availableServices = [];    // from /api/services
let selectedService = null;    // current service info object

// --- IndexedDB persistence ---
const DB_NAME = 'flute-editor';
const DB_VERSION = 1;
let db = null;
let tabs = [];       // [{id, name, code, params}]
let activeTabId = null;
let saveTimer = null;

const DEFAULT_CODE = `import json
from flute.ui import load_params
from pydantic import BaseModel


class Params(BaseModel):
    name: str = "world"


p = load_params(Params)
print(f"Params: {p}")

# Your code here...
result = {"message": f"Hello from Flute, {p.name}!", "echo": p.model_dump()}

# Write result (shown in the output panel)
json.dump(result, open("output.json", "w"))
print("Done!")`;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = () => {
      const d = req.result;
      if (!d.objectStoreNames.contains('state')) d.createObjectStore('state');
    };
    req.onsuccess = () => { db = req.result; resolve(db); };
    req.onerror = () => reject(req.error);
  });
}

function dbGet(key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('state', 'readonly');
    const req = tx.objectStore('state').get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

function dbPut(key, val) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction('state', 'readwrite');
    const req = tx.objectStore('state').put(val, key);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

function makeTabId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

function saveCurrentTabContent() {
  const tab = tabs.find(t => t.id === activeTabId);
  if (tab) {
    tab.code = codeEditor.getValue();
    tab.params = paramsEditor.getValue();
  }
}

function scheduleSave() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(persistState, 500);
}

async function persistState() {
  if (!db) return;
  saveCurrentTabContent();
  await dbPut('tabs', tabs);
  await dbPut('activeTabId', activeTabId);
}

function renderTabs() {
  const bar = document.getElementById('tab-bar');
  const addBtn = document.getElementById('add-tab');
  // Remove existing tab elements (keep add button)
  bar.querySelectorAll('.tab').forEach(el => el.remove());
  for (const tab of tabs) {
    const el = document.createElement('div');
    el.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
    el.innerHTML = `<span class="tab-name">${esc(tab.name)}</span>` +
      (tabs.length > 1 ? `<button class="close-tab" title="Close">&times;</button>` : '');
    el.querySelector('.tab-name').addEventListener('click', () => switchTab(tab.id));
    el.querySelector('.tab-name').addEventListener('dblclick', (e) => { e.stopPropagation(); startRename(tab.id, el); });
    const closeBtn = el.querySelector('.close-tab');
    if (closeBtn) closeBtn.addEventListener('click', (e) => { e.stopPropagation(); closeTab(tab.id); });
    bar.insertBefore(el, addBtn);
  }
}

function switchTab(id) {
  if (id === activeTabId) return;
  saveCurrentTabContent();
  activeTabId = id;
  const tab = tabs.find(t => t.id === id);
  if (tab) {
    codeEditor.setValue(tab.code);
    paramsEditor.setValue(tab.params);
  }
  renderTabs();
  scheduleSave();
}

function createTab(name, code, params) {
  saveCurrentTabContent();
  const id = makeTabId();
  const n = name || `script${tabs.length + 1}.py`;
  tabs.push({ id, name: n, code: code || '', params: params || '{}' });
  activeTabId = id;
  codeEditor.setValue(tabs[tabs.length - 1].code);
  paramsEditor.setValue(tabs[tabs.length - 1].params);
  renderTabs();
  scheduleSave();
}

function closeTab(id) {
  if (tabs.length <= 1) return;
  const idx = tabs.findIndex(t => t.id === id);
  if (idx < 0) return;
  tabs.splice(idx, 1);
  if (activeTabId === id) {
    const newIdx = Math.min(idx, tabs.length - 1);
    activeTabId = tabs[newIdx].id;
    codeEditor.setValue(tabs[newIdx].code);
    paramsEditor.setValue(tabs[newIdx].params);
  }
  renderTabs();
  scheduleSave();
}

function startRename(id, tabEl) {
  const tab = tabs.find(t => t.id === id);
  if (!tab) return;
  const nameSpan = tabEl.querySelector('.tab-name');
  const input = document.createElement('input');
  input.className = 'tab-name-input';
  input.value = tab.name;
  nameSpan.replaceWith(input);
  input.focus();
  input.select();
  const finish = () => {
    const val = input.value.trim() || tab.name;
    tab.name = val;
    renderTabs();
    scheduleSave();
  };
  input.addEventListener('blur', finish);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = tab.name; input.blur(); }
  });
}

// Resolve imports & aliases: scan code for "import X as Y" / "X = ..."
function resolveAliases(editor) {
  const aliases = {};
  editor.eachLine(line => {
    let m;
    // import X as Y
    if ((m = line.text.match(/import\s+([\w.]+)\s+as\s+(\w+)/))) aliases[m[2]] = m[1];
    // from X import Y  (Y could be a module with dot completions)
    if ((m = line.text.match(/from\s+([\w.]+)\s+import\s+(.+)/))) {
      for (const part of m[2].split(',')) {
        const trimmed = part.trim();
        const asMatch = trimmed.match(/(\w+)\s+as\s+(\w+)/);
        if (asMatch) aliases[asMatch[2]] = m[1] + '.' + asMatch[1];
        // also register the imported name itself with parent context
        else if (trimmed.match(/^\w+$/)) {
          const fullPath = m[1] + '.' + trimmed;
          // If we have completions for the imported name directly, keep it
          // Also map e.g. "from matplotlib import pyplot" -> pyplot = matplotlib.pyplot
          if (!DOT[trimmed] && DOT[m[1]]) aliases[trimmed] = fullPath;
        }
      }
    }
  });
  return aliases;
}

CodeMirror.registerHelper('hint', 'python', function(editor) {
  const cur = editor.getCursor();
  const lineText = editor.getLine(cur.line);
  const upToCursor = lineText.slice(0, cur.ch);

  // Check for dot-completion: "word." or "word.partial"
  const dotMatch = upToCursor.match(/([\w.]+)\.(\w*)$/);
  if (dotMatch) {
    const obj = dotMatch[1];
    const partial = dotMatch[2];
    const aliases = resolveAliases(editor);

    // Resolve the object: check aliases, then direct lookup
    let resolved = aliases[obj] || obj;
    // For chained like os.path, try the full chain first
    let completions = DOT[resolved];
    // Try last segment (e.g. "os.path" -> look up "path" too? No, keep os.path entries)
    if (!completions) {
      // Try stripping to last segment for common patterns
      const lastDot = resolved.lastIndexOf('.');
      if (lastDot >= 0) completions = DOT[resolved.slice(lastDot + 1)];
    }
    if (!completions) return;

    const matches = completions.filter(c => c.startsWith(partial) && c !== partial).slice(0, 30);
    if (!matches.length) return;
    return {
      list: matches,
      from: CodeMirror.Pos(cur.line, cur.ch - partial.length),
      to: CodeMirror.Pos(cur.line, cur.ch),
    };
  }

  // Regular word completion
  const token = editor.getTokenAt(cur);
  const word = token.string.replace(/[^\w]/g, '');
  if (word.length < 1) return;

  // Collect words from document (variable names, function names, etc.)
  const docWords = new Set();
  editor.eachLine(line => {
    for (const m of line.text.matchAll(/[a-zA-Z_]\w*/g)) docWords.add(m[0]);
  });
  const all = [...new Set([...PYTHON_WORDS, ...docWords])];
  const matches = all.filter(w => w.startsWith(word) && w !== word).sort().slice(0, 25);
  if (!matches.length) return;

  return {
    list: matches,
    from: CodeMirror.Pos(cur.line, token.start + (token.string.length - word.length)),
    to: CodeMirror.Pos(cur.line, token.end),
  };
});

const dropZone = document.getElementById('drop-zone');

// Sidebar drop zone
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('dragover');
  addFiles(e.dataTransfer.files);
});
// Center drop area (service mode)
serviceDropHint.addEventListener('dragover', e => { e.preventDefault(); serviceDropHint.style.borderColor = 'var(--blue)'; });
serviceDropHint.addEventListener('dragleave', () => { serviceDropHint.style.borderColor = ''; });
serviceDropHint.addEventListener('drop', e => {
  e.preventDefault(); serviceDropHint.style.borderColor = '';
  addFiles(e.dataTransfer.files);
});
serviceDropHint.addEventListener('click', () => { if (serviceMode) fileInput.click(); });
fileInput.addEventListener('change', () => { addFiles(fileInput.files); fileInput.value = ''; });

function addFiles(fileList) {
  for (const f of fileList) {
    const reader = new FileReader();
    reader.onload = () => {
      attachedFiles[f.name] = reader.result;
      renderFileList();
      // Show preview in center area for images
      if (serviceMode && f.type.startsWith('image/')) showCenterPreview(f.name, reader.result);
    };
    reader.readAsArrayBuffer(f);
  }
}

function showCenterPreview(name, buf) {
  const hint = document.getElementById('service-drop-hint');
  const blob = new Blob([buf]);
  const url = URL.createObjectURL(blob);
  hint.innerHTML = `<img src="${url}" style="max-width:100%;max-height:calc(100vh - 200px);object-fit:contain;border-radius:6px;">
    <div style="margin-top:8px;font-size:12px;color:var(--muted)">${esc(name)}</div>`;
}

function removeFile(name) {
  delete attachedFiles[name];
  renderFileList();
  // Restore drop hint if no files left
  if (serviceMode && Object.keys(attachedFiles).length === 0) restoreCenterHint();
}

function restoreCenterHint() {
  const hint = document.getElementById('service-drop-hint');
  const accept = (selectedService && selectedService.accept_files) || [];
  const label = accept.length ? accept.map(a => a.replace('/*', '')).join(' / ') : 'file';
  hint.innerHTML = `<div class="big" id="drop-hint-icon">Drop ${esc(label)} here</div>
    <div id="drop-hint-text">or use the file picker on the right</div>`;
}

function renderFileList() {
  const el = document.getElementById('file-list');
  el.innerHTML = Object.keys(attachedFiles).map(name => {
    const isImg = /\.(png|jpe?g|gif|webp|bmp|svg)$/i.test(name);
    let thumb = '';
    if (isImg) {
      const blob = new Blob([attachedFiles[name]]);
      const url = URL.createObjectURL(blob);
      thumb = `<img src="${url}" style="height:18px;border-radius:2px;vertical-align:middle;margin-right:4px;">`;
    }
    return `<span class="file-chip">${thumb}${esc(name)}<button onclick="removeFile('${esc(name)}')">&times;</button></span>`;
  }).join('');
}

// --- Service mode switching ---
function switchEndpoint() {
  const sel = document.getElementById('service-selector');
  const wt = sel.value;
  const svc = availableServices.find(s => s.worker_type === wt && s.type === 'service-runner');
  serviceMode = !!svc;
  selectedService = svc || null;

  // Toggle editor vs service drop hint
  const cm = document.querySelector('#editor-panel .CodeMirror');
  const hint = document.getElementById('service-drop-hint');
  const tabBar = document.getElementById('tab-bar');
  const paramsSection = document.querySelector('#side-panel .section:first-child');
  const stepsSection = document.getElementById('steps-section');
  const fileSection = document.getElementById('file-section');
  const fileInput = document.getElementById('file-input');

  if (serviceMode) {
    const accept = svc.accept_files || [];
    cm.style.display = 'none';
    hint.style.display = 'flex';
    tabBar.style.display = 'none';
    // Show preview if files already attached, otherwise show drop hint
    if (Object.keys(attachedFiles).length > 0) {
      const firstName = Object.keys(attachedFiles)[0];
      showCenterPreview(firstName, attachedFiles[firstName]);
    } else {
      restoreCenterHint();
    }
    // Set file input accept attribute
    fileInput.accept = accept.join(',');
    // Show file drop + params as task editor
    fileSection.style.display = '';
    paramsSection.classList.remove('hidden');
    paramsSection.querySelector('h3 small').textContent = 'task params';
    paramsEditor.setValue(JSON.stringify({}, null, 2));
    // Show steps
    stepsSection.classList.remove('hidden');
    const list = document.getElementById('steps-list');
    list.innerHTML = (svc.operations || []).map(op =>
      `<label class="step-check"><input type="checkbox" value="${esc(op)}" checked> ${esc(op)}</label>`
    ).join('');
  } else {
    // Python mode: code editor, params, no file drop
    cm.style.display = '';
    hint.style.display = 'none';
    tabBar.style.display = '';
    paramsSection.classList.remove('hidden');
    paramsSection.querySelector('h3 small').textContent = 'input.json';
    stepsSection.classList.add('hidden');
    fileSection.style.display = 'none';
    fileInput.accept = '';
  }
}

function getSelectedSteps() {
  return [...document.querySelectorAll('#steps-list input:checked')].map(cb => cb.value);
}

function updateProgress(data) {
  const wrap = document.getElementById('progress-bar-wrap');
  if (data && data.progress != null) {
    wrap.classList.add('active');
    const pct = Math.round(data.progress * 100);
    document.getElementById('progress-bar-fill').style.width = pct + '%';
    document.getElementById('progress-step').textContent = data.step || '';
    const etaText = data.eta_seconds != null ? `ETA ${data.eta_seconds.toFixed(1)}s` : `${pct}%`;
    document.getElementById('progress-pct').textContent = etaText;
  } else {
    wrap.classList.remove('active');
  }
}

// --- Run & poll ---
function runOrCancel() {
  if (polling && currentSid) { cancelSession(); return; }
  runCode();
}

async function cancelSession() {
  const btn = document.getElementById('run-btn');
  btn.disabled = true; btn.textContent = 'Cancelling...';
  try {
    await fetch(`/api/cancel/${currentSid}`, { method: 'POST' });
  } catch (e) { /* best-effort */ }
  btn.disabled = false;
}

async function runCode() {
  const btn = document.getElementById('run-btn');
  if (polling) return;

  const paramsText = paramsEditor.getValue().trim();
  let params = null;
  if (paramsText) {
    try { params = JSON.parse(paramsText); }
    catch (e) { setStatus('error', `Invalid JSON: ${e.message}`); return; }
  }

  const files = {};
  for (const [name, buf] of Object.entries(attachedFiles))
    files[name] = bufToBase64(buf);

  // Validate: service mode needs at least one file
  if (serviceMode && Object.keys(files).length === 0) {
    setStatus('error', 'Drop a file to process');
    return;
  }

  btn.textContent = 'Cancel'; btn.classList.add('running');
  setStatus('running', 'Submitting...');
  clearOutput();
  // Don't dismiss UI — keep it visible for in-place exchange on re-run
  updateProgress(null);

  const body = {
    params, files,
    max_memory_mb: +document.getElementById('memory').value,
    max_runtime_seconds: +document.getElementById('timeout').value,
  };

  if (serviceMode) {
    body.worker_type = selectedService.worker_type;
    body.steps = getSelectedSteps();
    // No code field -> triggers service mode on backend
  } else {
    body.code = codeEditor.getValue();
    body.worker_type = 'python';
  }

  try {
    const resp = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const { session_id } = await resp.json();
    currentSid = session_id;
    polling = true;
    pollStatus(session_id);
  } catch (e) {
    setStatus('error', `Network error: ${e.message}`);
    btn.textContent = 'Run'; btn.classList.remove('running');
  }
}

async function pollStatus(sid) {
  if (!polling || sid !== currentSid) return;
  try {
    const resp = await fetch(`/api/status/${sid}`);
    const data = await resp.json();
    updateLogs(data.log_lines);
    if (data.progress) updateProgress(data.progress);
    const terminal = ['completed', 'error', 'killed', 'cancelled', 'quota_exceeded'];
    if (terminal.includes(data.status)) {
      polling = false;
      updateProgress(null);
      const full = await fetch(`/api/result/${sid}`).then(r => r.json());
      showResult(full);
    } else {
      setStatus('running', data.status === 'queued' ? 'Queued...' : 'Running...');
      setTimeout(() => pollStatus(sid), 400);
    }
  } catch (e) {
    polling = false;
    setStatus('error', `Poll error: ${e.message}`);
  } finally {
    if (!polling) {
      const btn = document.getElementById('run-btn');
      btn.disabled = false; btn.textContent = 'Run'; btn.classList.remove('running');
      currentSid = null;
    }
  }
}

function showResult(r) {
  const statusLabel = r.status === 'cancelled' ? 'cancelled' : `${r.status}${r.exit_code !== null ? ` (exit ${r.exit_code})` : ''}`;
  setStatus(r.status, statusLabel);
  const lines = r.log_lines.length ? r.log_lines : r.logs ? [r.logs] : [];
  if (r.status === 'cancelled') lines.push('\n--- cancelled ---\n');
  updateLogs(lines);

  // Error — for cancellation, append to logs instead of showing separate label
  const errBox = document.getElementById('error-box');
  if (r.error && r.status !== 'cancelled') {
    errBox.className = 'error-text';
    errBox.textContent = r.error;
    errBox.classList.remove('hidden');
  }

  // UI descriptor (ui.json) — render interactive UI
  if (r.output_files['ui.json']) {
    try {
      const uiDesc = JSON.parse(atob(r.output_files['ui.json']));
      renderUI(uiDesc, r.output_files);
      delete r.output_files['ui.json'];
    } catch (e) { /* not valid UI descriptor, skip */ }
  } else {
    dismissUI();
  }

  // Result JSON (output.json)
  const resultBox = document.getElementById('result-box');
  if (r.output_files['output.json']) {
    try {
      const text = atob(r.output_files['output.json']);
      const obj = JSON.parse(text);
      resultBox.className = 'result-json';
      resultBox.textContent = JSON.stringify(obj, null, 2);
      resultBox.classList.remove('hidden');
      delete r.output_files['output.json'];
    } catch (e) { /* not valid JSON, show as file */ }
  }

  // Output files
  const filesEl = document.getElementById('output-files');
  const fileNames = Object.keys(r.output_files);
  if (fileNames.length) {
    filesEl.innerHTML = '<h3 style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px">Output Files</h3>';
    for (const name of fileNames) {
      const b64 = r.output_files[name];
      const ext = name.split('.').pop().toLowerCase();
      const div = document.createElement('div');

      if (['png','jpg','jpeg','gif','svg','webp'].includes(ext)) {
        const mime = ext === 'svg' ? 'image/svg+xml' : `image/${ext === 'jpg' ? 'jpeg' : ext}`;
        div.innerHTML = `<div class="output-file"><span class="fname">${esc(name)}</span>
          <button onclick="downloadB64('${esc(name)}','${b64}')">Download</button></div>
          <img class="output-img" src="data:${mime};base64,${b64}">`;
      } else if (['txt','csv','json','py','html','xml','yaml','yml','md','log'].includes(ext)) {
        const text = atob(b64);
        div.innerHTML = `<div class="output-file"><span class="fname">${esc(name)}</span>
          <button onclick="downloadB64('${esc(name)}','${b64}')">Download</button></div>
          <div class="output-text">${esc(text)}</div>`;
      } else {
        div.innerHTML = `<div class="output-file"><span class="fname">${esc(name)}</span>
          <button onclick="downloadB64('${esc(name)}','${b64}')">Download</button></div>`;
      }
      filesEl.appendChild(div);
    }
    filesEl.classList.remove('hidden');
  }
}

function downloadB64(name, b64) {
  const a = document.createElement('a');
  a.href = `data:application/octet-stream;base64,${b64}`;
  a.download = name; a.click();
}

function bufToBase64(buf) {
  const bytes = new Uint8Array(buf);
  let bin = '';
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

function esc(s) {
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

// --- Environment switching ---
let allEnvironments = [];

async function loadEnvironments() {
  try {
    const r = await fetch('/api/environments');
    const data = await r.json();
    allEnvironments = data.environments || [];
    const sel = document.getElementById('env-selector');
    sel.innerHTML = '';
    for (const env of allEnvironments) {
      const opt = document.createElement('option');
      opt.value = env.key;
      opt.textContent = env.name;
      sel.appendChild(opt);
    }
    // Restore last-used env from IndexedDB or use server's current
    const lastEnv = db ? await dbGet('lastEnvKey') : null;
    const target = lastEnv && allEnvironments.find(e => e.key === lastEnv)
      ? lastEnv
      : data.current;
    if (target && target !== data.current) {
      sel.value = target;
      await switchEnv();
    } else if (target) {
      sel.value = target;
    }
  } catch (e) { /* silent */ }
}

async function switchEnv() {
  const sel = document.getElementById('env-selector');
  const key = sel.value;
  try {
    const r = await fetch('/api/environment', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({key}),
    });
    if (!r.ok) { setStatus('error', 'Failed to switch environment'); return; }
    if (db) await dbPut('lastEnvKey', key);
    // Refresh services and footer for the new environment
    await Promise.all([loadServices(), loadEnvFooter()]);
  } catch (e) {
    setStatus('error', `Env switch: ${e.message}`);
  }
}

// --- Load available services ---
async function loadServices() {
  try {
    const resp = await fetch('/api/services');
    const fresh = await resp.json();
    // Only rebuild dropdown if the service list actually changed
    const oldKeys = availableServices.map(s => s.worker_type).sort().join(',');
    const newKeys = fresh.map(s => s.worker_type).sort().join(',');
    if (oldKeys === newKeys && availableServices.length > 0) return;
    availableServices = fresh;
    const sel = document.getElementById('service-selector');
    const prev = sel.value;
    // Reset to just Python, then add services
    sel.innerHTML = '<option value="python">Python</option>';
    for (const svc of availableServices) {
      if (svc.type === 'service-runner') {
        const opt = document.createElement('option');
        opt.value = svc.worker_type;
        opt.textContent = svc.worker_type;
        sel.appendChild(opt);
      }
    }
    // Restore previous selection if still valid
    if (prev && [...sel.options].some(o => o.value === prev)) sel.value = prev;
    else if (serviceMode && selectedService) {
      const still = availableServices.find(s => s.worker_type === selectedService.worker_type);
      if (still) sel.value = selectedService.worker_type;
    }
    // Sync UI state after repopulating
    switchEndpoint();
  } catch (e) { /* silent */ }
}

// --- Fetch and display env info in footer ---
async function loadEnvFooter() {
  try {
    const r = await fetch('/api/env');
    const env = await r.json();
    const parts = [];
    if (env.redis) {
      const host = env.redis.replace(/:\d+.*$/, '');
      const segs = host.split('.');
      parts.push(segs.length > 2 ? segs.slice(0, 2).join('.') : host);
    }
    if (env.workers !== undefined) parts.push(`${env.workers} worker${env.workers !== 1 ? 's' : ''}`);
    document.getElementById('status-footer').textContent = parts.join('  \u00b7  ');
  } catch (e) { /* silent */ }
}

// --- Samples menu ---
let samplesIndex = {};  // { worker_type: { categories: [...] } }

async function loadSamplesIndex() {
  try {
    const resp = await fetch('/api/samples');
    samplesIndex = await resp.json();
    buildSamplesMenu();
  } catch (e) { /* silent */ }
}

function buildSamplesMenu() {
  const menu = document.getElementById('samples-menu');
  menu.innerHTML = '';
  // Flatten all worker_type samples into the menu
  for (const [wt, index] of Object.entries(samplesIndex)) {
    for (const cat of (index.categories || [])) {
      const header = document.createElement('div');
      header.className = 'samples-cat';
      header.textContent = cat.name;
      menu.appendChild(header);
      for (const item of (cat.items || [])) {
        const el = document.createElement('div');
        el.className = 'sample-item';
        el.innerHTML = `<div class="title">${esc(item.title)}</div>` +
          (item.description ? `<div class="desc">${esc(item.description)}</div>` : '');
        el.addEventListener('click', () => loadSample(wt, item));
        menu.appendChild(el);
      }
    }
  }
  if (menu.children.length === 0) {
    menu.innerHTML = '<div style="padding:12px;color:var(--muted);font-size:12px">' +
      'No samples available — workers not connected</div>';
  }
}

function toggleSamplesMenu() {
  const menu = document.getElementById('samples-menu');
  const btn = document.getElementById('samples-btn');
  const wasOpen = menu.classList.contains('open');
  menu.classList.toggle('open');
  if (!wasOpen) {
    const rect = btn.getBoundingClientRect();
    menu.style.top = rect.bottom + 4 + 'px';
    menu.style.left = rect.left + 'px';
    loadSamplesIndex();
  }
}

// Close samples menu on outside click
document.addEventListener('click', (e) => {
  const menu = document.getElementById('samples-menu');
  const btn = document.getElementById('samples-btn');
  if (!menu.contains(e.target) && e.target !== btn) {
    menu.classList.remove('open');
  }
});

async function loadSample(workerType, item) {
  document.getElementById('samples-menu').classList.remove('open');
  try {
    const resp = await fetch(`/api/sample/${encodeURIComponent(workerType)}/${encodeURIComponent(item.file)}`);
    if (!resp.ok) { setStatus('error', 'Failed to load sample'); return; }
    const data = await resp.json();
    // Ensure we're in Python endpoint mode
    const sel = document.getElementById('service-selector');
    if (sel.value !== 'python') {
      sel.value = 'python';
      switchEndpoint();
    }
    // Load into a new tab
    createTab(item.title + '.py', data.code, '{}');
    setStatus('idle', `Loaded: ${item.title}`);
  } catch (e) {
    setStatus('error', `Load sample: ${e.message}`);
  }
}

// --- UI Renderer ---
const ALLOWED_COMPONENT_TYPES = new Set(['plotly', 'table', 'three', 'text', 'image']);
const ALLOWED_LAYOUT_TYPES = new Set(['split-h', 'split-v', 'tabs', 'grid']);
const ALLOWED_CONTROL_TYPES = new Set(['slider', 'number', 'text', 'select', 'checkbox', 'file-drop']);
const MAX_COMPONENTS = 20;
const MAX_CONTROLS = 30;

function sanitizeDescriptor(desc) {
  if (!desc || typeof desc !== 'object' || desc.version !== 1) return null;
  if (!Array.isArray(desc.components)) return null;
  const clean = { version: 1, components: [] };
  for (const c of desc.components.slice(0, MAX_COMPONENTS)) {
    if (!c || !ALLOWED_COMPONENT_TYPES.has(c.type)) continue;
    clean.components.push(c);
  }
  if (desc.layout && ALLOWED_LAYOUT_TYPES.has(desc.layout.type)) clean.layout = desc.layout;
  if (Array.isArray(desc.controls)) {
    clean.controls = desc.controls.filter(c => c && ALLOWED_CONTROL_TYPES.has(c.type)).slice(0, MAX_CONTROLS);
  }
  return clean;
}

function renderUI(desc, outputFiles) {
  const panel = document.getElementById('ui-panel');
  const container = document.getElementById('ui-container');
  const controlsBar = document.getElementById('ui-controls-bar');
  container.innerHTML = '';
  controlsBar.innerHTML = '';
  controlsBar.style.display = 'none';

  const clean = sanitizeDescriptor(desc);
  if (!clean || clean.components.length === 0) { panel.classList.remove('active'); return; }

  // Switch to UI view: hide editor, show UI panel (keep side panel visible)
  panel.classList.add('active');
  document.querySelector('#editor-panel .CodeMirror').style.display = 'none';
  document.getElementById('tab-bar').style.display = 'none';

  const hasLayout = !!clean.layout;
  container.classList.toggle('ui-layout-mode', hasLayout);

  if (hasLayout) {
    // Dashboard mode: explicit layout fills the panel
    const root = buildLayout(clean.layout, clean.components, outputFiles);
    container.appendChild(root);
  } else {
    // Document mode: vertical flow, each component in its own block
    clean.components.forEach(comp => {
      const cell = document.createElement('div');
      cell.className = 'ui-cell';
      renderComponent(comp, cell, outputFiles);
      container.appendChild(cell);
    });
  }

  // Controls
  if (clean.controls && clean.controls.length > 0) {
    controlsBar.style.display = 'flex';
    buildControls(clean.controls, controlsBar);
  }
}

function buildLayout(layout, components, outputFiles) {
  if (!layout || components.length === 1) {
    const cell = document.createElement('div');
    cell.className = 'ui-cell';
    cell.style.flex = '1';
    if (components.length > 0) renderComponent(components[0], cell, outputFiles);
    return cell;
  }

  if (layout.type === 'tabs') {
    const wrap = document.createElement('div');
    wrap.style.display = 'flex';
    wrap.style.flexDirection = 'column';
    wrap.style.flex = '1';
    wrap.style.overflow = 'hidden';
    const bar = document.createElement('div');
    bar.className = 'ui-tabs-bar';
    const contents = [];
    components.forEach((comp, i) => {
      const label = (layout.labels && layout.labels[i]) || comp.id || `Tab ${i + 1}`;
      const btn = document.createElement('button');
      btn.className = 'ui-tab-btn' + (i === 0 ? ' active' : '');
      btn.textContent = label;
      const content = document.createElement('div');
      content.className = 'ui-tab-content' + (i === 0 ? ' active' : '');
      renderComponent(comp, content, outputFiles);
      btn.onclick = () => {
        bar.querySelectorAll('.ui-tab-btn').forEach(b => b.classList.remove('active'));
        contents.forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        content.classList.add('active');
      };
      bar.appendChild(btn);
      contents.push(content);
    });
    wrap.appendChild(bar);
    contents.forEach(c => wrap.appendChild(c));
    return wrap;
  }

  if (layout.type === 'grid') {
    const grid = document.createElement('div');
    grid.className = 'ui-grid';
    grid.style.gridTemplateColumns = `repeat(${layout.columns || 2}, 1fr)`;
    components.forEach(comp => {
      const cell = document.createElement('div');
      cell.className = 'ui-cell';
      renderComponent(comp, cell, outputFiles);
      grid.appendChild(cell);
    });
    return grid;
  }

  // split-h or split-v
  const container = document.createElement('div');
  container.className = layout.type === 'split-h' ? 'ui-split-h' : 'ui-split-v';
  const ratios = layout.ratios || components.map(() => 1);
  const total = ratios.reduce((a, b) => a + b, 0);
  components.forEach((comp, i) => {
    const cell = document.createElement('div');
    cell.className = 'ui-cell';
    const pct = ((ratios[i] || 1) / total * 100).toFixed(2);
    cell.style.flex = `0 0 ${pct}%`;
    if (layout.type === 'split-h') cell.style.borderRight = '1px solid var(--border)';
    else cell.style.borderBottom = '1px solid var(--border)';
    renderComponent(comp, cell, outputFiles);
    container.appendChild(cell);
  });
  // Remove border from last cell
  if (container.lastElementChild) {
    container.lastElementChild.style.borderRight = '';
    container.lastElementChild.style.borderBottom = '';
  }
  return container;
}

function renderComponent(comp, container, outputFiles) {
  switch (comp.type) {
    case 'plotly': renderPlotly(comp, container); break;
    case 'table': renderTable(comp, container); break;
    case 'three': renderThree(comp, container); break;
    case 'text': renderText(comp, container); break;
    case 'image': renderImage(comp, container, outputFiles); break;
  }
}

function renderPlotly(comp, container) {
  const div = document.createElement('div');
  div.className = 'ui-plotly-wrap';
  container.appendChild(div);
  const plotLayout = Object.assign({
    paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(30,30,46,0.8)',
    font: { color: '#cdd6f4', size: 12 },
    margin: { l: 50, r: 20, t: 40, b: 40 },
  }, comp.layout || {});
  const config = Object.assign({ responsive: true, displaylogo: false }, comp.config || {});
  if (typeof Plotly !== 'undefined') Plotly.newPlot(div, comp.data, plotLayout, config);
}

function renderTable(comp, container) {
  const wrap = document.createElement('div');
  wrap.className = 'ui-table-wrap';
  if (comp.title) {
    const h = document.createElement('div');
    h.style.cssText = 'font-size:13px;font-weight:600;margin-bottom:8px;color:var(--text)';
    h.textContent = comp.title;
    wrap.appendChild(h);
  }
  const table = document.createElement('table');
  const thead = document.createElement('thead');
  const headerRow = document.createElement('tr');
  for (const col of comp.columns) {
    const th = document.createElement('th');
    th.textContent = col.label || col.name || col.field || '';
    headerRow.appendChild(th);
  }
  thead.appendChild(headerRow);
  table.appendChild(thead);
  const tbody = document.createElement('tbody');
  for (const row of comp.rows) {
    const tr = document.createElement('tr');
    for (const col of comp.columns) {
      const td = document.createElement('td');
      const field = col.field || col.name || '';
      td.textContent = row[field] != null ? String(row[field]) : '';
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
  wrap.appendChild(table);
  container.appendChild(wrap);
}

async function renderThree(comp, container) {
  const wrap = document.createElement('div');
  wrap.className = 'ui-three-wrap';
  container.appendChild(wrap);
  const canvas = document.createElement('canvas');
  canvas.className = 'ui-three-canvas';
  wrap.appendChild(canvas);
  try {
    const THREE = await import('three');
    const { OrbitControls } = await import('three/addons/controls/OrbitControls');

    const scene = new THREE.Scene();
    const sd = comp.scene || {};
    scene.background = new THREE.Color(sd.background || '#1a1a2e');

    // Lights
    const ambientIntensity = sd.ambient_light != null ? sd.ambient_light : 0.4;
    scene.add(new THREE.AmbientLight(0xffffff, ambientIntensity));
    if (sd.directional_light) {
      const dl = sd.directional_light;
      const light = new THREE.DirectionalLight(0xffffff, dl.intensity || 0.8);
      if (dl.position) light.position.set(...dl.position);
      else light.position.set(5, 10, 7);
      scene.add(light);
    } else {
      const light = new THREE.DirectionalLight(0xffffff, 0.8);
      light.position.set(5, 10, 7);
      scene.add(light);
    }

    // Camera
    const cam = comp.camera || {};
    const w = wrap.clientWidth || 400;
    const h = wrap.clientHeight || 300;
    const camera = new THREE.PerspectiveCamera(cam.fov || 60, w / h, 0.1, 1000);
    const cp = cam.position || [5, 5, 5];
    camera.position.set(...cp);
    if (cam.lookAt) camera.lookAt(new THREE.Vector3(...cam.lookAt));
    else camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(w, h);
    renderer.setPixelRatio(window.devicePixelRatio);

    if (comp.controls !== false) {
      const ctrl = new OrbitControls(camera, renderer.domElement);
      ctrl.enableDamping = true;
    }

    // Build objects
    for (const obj of (sd.objects || [])) {
      const mesh = buildThreeObject(THREE, obj);
      if (mesh) scene.add(mesh);
    }

    // Render loop
    function animate() {
      if (!document.getElementById('ui-panel').classList.contains('active')) return;
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    animate();

    // Resize
    const ro = new ResizeObserver(() => {
      const cw = wrap.clientWidth;
      const ch = wrap.clientHeight;
      if (cw && ch) {
        camera.aspect = cw / ch;
        camera.updateProjectionMatrix();
        renderer.setSize(cw, ch);
      }
    });
    ro.observe(wrap);
  } catch (e) {
    wrap.innerHTML = `<div class="ui-text-block" style="color:var(--red)">Three.js error: ${esc(e.message)}</div>`;
  }
}

function buildThreeObject(THREE, obj) {
  const color = obj.color ? new THREE.Color(obj.color) : new THREE.Color(0x89b4fa);
  const pos = obj.position || [0, 0, 0];

  switch (obj.type) {
    case 'box': {
      const s = obj.size || [1, 1, 1];
      const geom = new THREE.BoxGeometry(...s);
      const mat = new THREE.MeshStandardMaterial({ color });
      const mesh = new THREE.Mesh(geom, mat);
      mesh.position.set(...pos);
      if (obj.rotation) mesh.rotation.set(...obj.rotation);
      return mesh;
    }
    case 'sphere': {
      const geom = new THREE.SphereGeometry(obj.radius || 0.5, 32, 32);
      const mat = new THREE.MeshStandardMaterial({ color });
      const mesh = new THREE.Mesh(geom, mat);
      mesh.position.set(...pos);
      return mesh;
    }
    case 'cylinder': {
      const geom = new THREE.CylinderGeometry(obj.radiusTop || 0.5, obj.radiusBottom || 0.5, obj.height || 1, 32);
      const mat = new THREE.MeshStandardMaterial({ color });
      const mesh = new THREE.Mesh(geom, mat);
      mesh.position.set(...pos);
      return mesh;
    }
    case 'line': {
      const points = (obj.points || []).map(p => new THREE.Vector3(...p));
      if (points.length < 2) return null;
      const geom = new THREE.BufferGeometry().setFromPoints(points);
      return new THREE.Line(geom, new THREE.LineBasicMaterial({ color }));
    }
    case 'bezier': {
      const pts = obj.points || [];
      if (pts.length < 4) return null;
      const curve = new THREE.CubicBezierCurve3(
        new THREE.Vector3(...pts[0]), new THREE.Vector3(...pts[1]),
        new THREE.Vector3(...pts[2]), new THREE.Vector3(...pts[3])
      );
      const geom = new THREE.BufferGeometry().setFromPoints(curve.getPoints(obj.segments || 50));
      return new THREE.Line(geom, new THREE.LineBasicMaterial({ color }));
    }
    case 'catmull': {
      const pts = (obj.points || []).map(p => new THREE.Vector3(...p));
      if (pts.length < 2) return null;
      const curve = new THREE.CatmullRomCurve3(pts, !!obj.closed);
      const geom = new THREE.BufferGeometry().setFromPoints(curve.getPoints(obj.segments || 50));
      return new THREE.Line(geom, new THREE.LineBasicMaterial({ color }));
    }
    case 'surface': {
      const range = obj.range || [[-3, 3], [-3, 3]];
      const res = obj.resolution || 50;
      const geom = new THREE.PlaneGeometry(
        range[0][1] - range[0][0], range[1][1] - range[1][0], res, res
      );
      const posAttr = geom.attributes.position;
      const fn = obj.func || 'Math.sin(x)*Math.cos(y)';
      for (let i = 0; i < posAttr.count; i++) {
        const x = posAttr.getX(i) + (range[0][0] + range[0][1]) / 2;
        const y = posAttr.getY(i) + (range[1][0] + range[1][1]) / 2;
        try { posAttr.setZ(i, new Function('x', 'y', `return ${fn}`)(x, y)); }
        catch { posAttr.setZ(i, 0); }
      }
      geom.computeVertexNormals();
      const mat = new THREE.MeshStandardMaterial({ color, side: THREE.DoubleSide, wireframe: !!obj.wireframe });
      const mesh = new THREE.Mesh(geom, mat);
      mesh.rotation.x = -Math.PI / 2;
      mesh.position.set(...pos);
      return mesh;
    }
    case 'mesh': {
      const geom = new THREE.BufferGeometry();
      if (obj.vertices) geom.setAttribute('position', new THREE.Float32BufferAttribute(obj.vertices.flat(), 3));
      if (obj.faces) geom.setIndex(obj.faces.flat());
      geom.computeVertexNormals();
      const mat = new THREE.MeshStandardMaterial({ color, side: THREE.DoubleSide });
      const mesh = new THREE.Mesh(geom, mat);
      mesh.position.set(...pos);
      return mesh;
    }
    default: return null;
  }
}

function renderText(comp, container) {
  const div = document.createElement('div');
  div.className = 'ui-text-block';
  div.textContent = comp.content || '';
  container.appendChild(div);
}

function renderImage(comp, container, outputFiles) {
  const div = document.createElement('div');
  div.className = 'ui-image-wrap';
  const b64 = outputFiles && outputFiles[comp.filename];
  if (b64) {
    const ext = (comp.filename || '').split('.').pop().toLowerCase();
    const mime = ext === 'svg' ? 'image/svg+xml' : `image/${ext === 'jpg' ? 'jpeg' : ext}`;
    const img = document.createElement('img');
    img.src = `data:${mime};base64,${b64}`;
    img.alt = comp.alt || comp.filename || '';
    div.appendChild(img);
  } else {
    div.textContent = `Image not found: ${comp.filename || '(none)'}`;
    div.style.color = 'var(--muted)';
  }
  container.appendChild(div);
}

function buildControls(controls, bar) {
  for (const ctrl of controls) {
    const wrap = document.createElement('div');
    wrap.className = 'ui-control';
    const lbl = ctrl.label || ctrl.name;
    switch (ctrl.type) {
      case 'slider': {
        wrap.innerHTML = `<label>${esc(lbl)}</label>
          <input type="range" min="${ctrl.min}" max="${ctrl.max}" step="${ctrl.step}" value="${ctrl.value}"
            data-name="${esc(ctrl.name)}">
          <span style="font-size:11px;color:var(--muted);min-width:30px">${ctrl.value}</span>`;
        const input = wrap.querySelector('input');
        const span = wrap.querySelector('span');
        let sliderTimer = null;
        input.oninput = () => {
          span.textContent = input.value;
          clearTimeout(sliderTimer);
          sliderTimer = setTimeout(() => rerunWithControls(), 400);
        };
        break;
      }
      case 'number': {
        wrap.innerHTML = `<label>${esc(lbl)}</label>
          <input type="number" value="${ctrl.value}" data-name="${esc(ctrl.name)}">`;
        break;
      }
      case 'text': {
        wrap.innerHTML = `<label>${esc(lbl)}</label>
          <input type="text" value="${esc(ctrl.value || '')}" data-name="${esc(ctrl.name)}">`;
        break;
      }
      case 'select': {
        const opts = (ctrl.options || []).map(o =>
          `<option value="${esc(o)}"${o === ctrl.value ? ' selected' : ''}>${esc(o)}</option>`
        ).join('');
        wrap.innerHTML = `<label>${esc(lbl)}</label><select data-name="${esc(ctrl.name)}">${opts}</select>`;
        break;
      }
      case 'checkbox': {
        wrap.innerHTML = `<label><input type="checkbox" data-name="${esc(ctrl.name)}"${ctrl.value ? ' checked' : ''}> ${esc(lbl)}</label>`;
        break;
      }
      case 'file-drop': {
        const zone = document.createElement('div');
        zone.className = 'ui-file-drop-zone';
        zone.textContent = lbl || `Drop ${ctrl.accept || 'file'} here`;
        zone.dataset.name = ctrl.name;
        zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
        zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
        zone.addEventListener('drop', e => {
          e.preventDefault(); zone.classList.remove('dragover');
          for (const f of e.dataTransfer.files) {
            const reader = new FileReader();
            reader.onload = () => {
              attachedFiles[f.name] = reader.result;
              zone.textContent = f.name;
              if (ctrl.auto_submit) rerunWithControls();
            };
            reader.readAsArrayBuffer(f);
          }
        });
        wrap.appendChild(zone);
        break;
      }
    }
    bar.appendChild(wrap);
  }
  // Submit button
  const btn = document.createElement('button');
  btn.className = 'ui-submit-btn';
  btn.textContent = 'Re-run';
  btn.onclick = () => rerunWithControls();
  bar.appendChild(btn);
}

function collectControlValues() {
  const bar = document.getElementById('ui-controls-bar');
  const params = {};
  for (const input of bar.querySelectorAll('[data-name]')) {
    const name = input.dataset.name;
    if (input.type === 'checkbox') params[name] = input.checked;
    else if (input.type === 'range' || input.type === 'number') params[name] = parseFloat(input.value);
    else params[name] = input.value;
  }
  return params;
}

function rerunWithControls() {
  // Merge control values into params and re-run
  const controlParams = collectControlValues();
  let existing = {};
  try { existing = JSON.parse(paramsEditor.getValue()); } catch {}
  const merged = Object.assign(existing, controlParams);
  paramsEditor.setValue(JSON.stringify(merged, null, 2));
  runCode();
}

function dismissUI() {
  const panel = document.getElementById('ui-panel');
  panel.classList.remove('active');
  document.getElementById('ui-container').classList.remove('ui-layout-mode');
  document.querySelector('#editor-panel .CodeMirror').style.display = '';
  document.getElementById('tab-bar').style.display = '';
}

// --- Init: load from IndexedDB, restore env, then tabs ---
(async () => {
  await openDB();

  // Load environments first (may switch Redis)
  await loadEnvironments();
  await loadEnvFooter();

  // Load tabs
  const savedTabs = await dbGet('tabs');
  const savedActive = await dbGet('activeTabId');
  if (savedTabs && savedTabs.length > 0) {
    tabs = savedTabs;
    activeTabId = savedActive && tabs.find(t => t.id === savedActive) ? savedActive : tabs[0].id;
    const tab = tabs.find(t => t.id === activeTabId);
    codeEditor.setValue(tab.code);
    paramsEditor.setValue(tab.params);
  } else {
    const id = makeTabId();
    tabs = [{ id, name: 'main.py', code: DEFAULT_CODE, params: '{"name": "world"}' }];
    activeTabId = id;
  }
  renderTabs();
  codeEditor.refresh();

  // Periodically refresh services (workers may come online with delay)
  setInterval(loadServices, 3000);
})();
</script>
<div id="samples-menu"></div>
</body>
